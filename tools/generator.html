<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MediaDB Generator + Steam</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0a0a0c; color: #fff; margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        .panel { background: #141416; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        h2 { margin-top: 0; color: #7c3aed; }
        h3 { margin: 15px 0 5px; color: #aaa; font-size: 14px; text-transform: uppercase; }
        label { font-size: 13px; color: #666; margin-top: 8px; display: block; margin-bottom: 4px; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; background: #1a1a1c; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        .tags-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; background: #1a1a1c; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .tags-grid label { margin: 0; display: flex; align-items: center; gap: 5px; color: #fff; cursor: pointer; font-size: 13px; }
        pre { background: #000; padding: 15px; border-radius: 8px; color: #44bd32; overflow-x: auto; min-height: 100px; border: 1px solid rgba(255,255,255,0.1); }
        
        .steam-box { background: rgba(68, 189, 50, 0.1); border: 1px solid #44bd32; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn { background: #44bd32; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: #4cd137; }
        .btn:disabled { background: #333; cursor: not-allowed; }

        .img-preview { display: flex; gap: 10px; margin-top: 10px; }
        .img-card { flex: 1; background: #222; padding: 10px; border-radius: 8px; text-align: center; }
        .img-card img { max-width: 100%; height: auto; display: block; margin-bottom: 5px; border-radius: 4px; }
        .img-card a { color: #5dade2; font-size: 12px; text-decoration: none; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- ЛЕВАЯ ПАНЕЛЬ -->
    <div class="panel">
        <h2>Генератор</h2>

        <!-- Блок Steam -->
        <div class="steam-box">
            <label style="color: #fff; margin-top:0;">Steam App ID</label>
            <input type="number" id="steamId" placeholder="Например: 1091500 (Cyberpunk)">
            <button class="btn" id="fetchSteamBtn" onclick="fetchSteamData()">Заполнить из Steam</button>
            <div id="steamStatus" style="font-size: 12px; margin-top: 5px; color: #aaa;"></div>
        </div>
        
        <label>Название игры</label>
        <input type="text" id="title">

        <label>Масштаб (Tier)</label>
        <select id="tier">
            <option value="tier_aaa">AAA (Блокбастер)</option>
            <option value="tier_aa">AA (Средний)</option>
            <option value="tier_indie">Indie (Инди)</option>
        </select>

        <label>Трейлер (Embed URL)</label>
        <input type="text" id="trailer" placeholder="https://www.youtube.com/embed/...">

        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; color: #fff; margin: 15px 0;">
            <input type="checkbox" id="hasBanner" checked> Нужен баннер?
        </label>

        <label>Описание</label>
        <textarea id="desc"></textarea>

        <label>Теги</label>
        <div class="tags-grid" id="tagsContainer"></div>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ -->
    <div class="panel">
        <h2>Результат</h2>
        
        <!-- Превью картинок для скачивания -->
        <div id="imagesSection" class="hidden">
            <h3>Скачать картинки</h3>
            <div style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Сохрани эти картинки в папку репозитория под указанными именами.</div>
            <div class="img-preview">
                <div class="img-card">
                    <span>Обложка</span>
                    <img id="previewCover" src="">
                    <a id="linkCover" href="#" target="_blank" download>Скачать</a>
                    <div id="nameCover" style="font-size: 11px; color: #7c3aed; margin-top: 5px;">cover.jpg</div>
                </div>
                <div class="img-card" id="bannerCard">
                    <span>Баннер</span>
                    <img id="previewBanner" src="">
                    <a id="linkBanner" href="#" target="_blank" download>Скачать</a>
                    <div id="nameBanner" style="font-size: 11px; color: #7c3aed; margin-top: 5px;">banner.jpg</div>
                </div>
            </div>
        </div>

        <h3>JSON Код</h3>
        <pre id="output">// Заполни форму или введи Steam ID...</pre>
    </div>

    <script>
        const ALL_TAGS =[
            { id: "tag_action", label: "Экшен", keys: ["action", "экшен"] },
            { id: "tag_shooter", label: "Шутер", keys: ["shooter", "fps", "шутер"] },
            { id: "tag_rpg", label: "RPG", keys: ["rpg", "role-playing", "ролевая"] },
            { id: "tag_strategy", label: "Стратегия", keys: ["strategy", "стратегия"] },
            { id: "tag_adventure", label: "Приключение", keys: ["adventure", "приключение"] },
            { id: "tag_puzzle", label: "Головоломка", keys: ["puzzle", "головоломка"] },
            { id: "tag_sim", label: "Симулятор", keys: ["simulation", "симулятор"] },
            { id: "tag_rogue", label: "Рогалик", keys: ["rogue", "roguelike", "рогалик"] },
            { id: "tag_survival", label: "Выживание", keys: ["survival", "выживание"] },
            { id: "tag_horror", label: "Хоррор", keys: ["horror", "хоррор"] },
            { id: "tag_platform", label: "Платформер", keys: ["platformer", "платформер"] },
            { id: "tag_scifi", label: "Sci-Fi", keys: ["sci-fi", "sci fi", "научная фантастика"] },
            { id: "tag_cyberpunk", label: "Киберпанк", keys: ["cyberpunk", "киберпанк"] },
            { id: "tag_fantasy", label: "Фэнтези", keys: ["fantasy", "фэнтези"] },
            { id: "tag_space", label: "Космос", keys: ["space", "космос"] },
            { id: "tag_postapoc", label: "Постапокалипсис", keys: ["post-apocalyptic", "постапокалипсис"] },
            { id: "tag_anime", label: "Аниме", keys: ["anime", "аниме"] },
            { id: "tag_retro", label: "Ретро", keys: ["retro", "pixel", "ретро"] },
            { id: "tag_military", label: "Милитари", keys: ["military", "war", "военная"] },
            { id: "tag_single", label: "Одиночная", keys: ["singleplayer", "одиночная"] },
            { id: "tag_multi", label: "Мультиплеер", keys: ["multiplayer", "мультиплеер"] },
            { id: "tag_coop", label: "Кооператив", keys: ["co-op", "coop", "кооператив"] },
            { id: "tag_pvp", label: "PvP", keys: ["pvp", "player vs player"] },
            { id: "tag_story", label: "Глубокий сюжет", keys: ["story", "rich", "сюжет"] },
            { id: "tag_openworld", label: "Открытый мир", keys: ["open world", "открытый мир"] },
            { id: "tag_hardcore", label: "Сложная", keys: ["difficult", "hardcore", "сложная"] },
            { id: "tag_relax", label: "Расслабляющая", keys: ["relaxing", "casual", "казуальная"] },
            { id: "tag_pixel", label: "Пиксельная", keys: ["pixel", "пиксельная"] }
        ];

        const tagsContainer = document.getElementById('tagsContainer');
        ALL_TAGS.forEach(tag => {
            tagsContainer.innerHTML += `<label><input type="checkbox" value="${tag.id}" id="chk_${tag.id}"> ${tag.label}</label>`;
        });

        const translitMap = { 'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ь':'','ы':'y','ъ':'','э':'e','ю':'yu','я':'ya'};
        function transliterate(str) { return str.toLowerCase().split('').map(c => translitMap[c] || c).join(''); }
        function safeFilename(str) { return transliterate(str).replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, ''); }

        // --- МАГИЯ STEAM (ИСПРАВЛЕННАЯ С ALLORIGINS) ---
        async function fetchSteamData() {
            const appId = document.getElementById('steamId').value.trim();
            const btn = document.getElementById('fetchSteamBtn');
            const status = document.getElementById('steamStatus');
            
            if (!appId) return;
            
            btn.disabled = true;
            btn.textContent = "Загрузка...";
            status.textContent = "Стучимся в Steam...";

            try {
                // Используем AllOrigins для обхода CORS
                const targetUrl = `https://store.steampowered.com/api/appdetails?appids=${appId}&l=russian`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                
                const response = await fetch(proxyUrl);
                const wrapper = await response.json();
                
                // AllOrigins возвращает данные как строку в поле contents
                const data = JSON.parse(wrapper.contents);
                
                if (!data[appId] || !data[appId].success) {
                    throw new Error("Игра не найдена или ошибка API Steam");
                }

                const game = data[appId].data;

                // 1. Заполняем поля
                document.getElementById('title').value = game.name;
                document.getElementById('desc').value = game.short_description;

                // 2. Ищем трейлер
                // Steam API не дает youtube-ссылки, поэтому оставляем пустым, чтобы не ломать iframe
                document.getElementById('trailer').value = ""; 

                // 3. Авто-определение тегов по жанрам Steam
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                const steamGenres = game.genres ? game.genres.map(g => g.description.toLowerCase()) : [];
                const steamCategories = game.categories ? game.categories.map(c => c.description.toLowerCase()) : [];
                const allSteamTags = [...steamGenres, ...steamCategories].join(" ");

                ALL_TAGS.forEach(tag => {
                    const match = tag.keys.some(k => allSteamTags.includes(k));
                    if (match) document.getElementById(`chk_${tag.id}`).checked = true;
                });
                
                // Пробуем угадать Tier
                if (steamGenres.includes("инди") || steamGenres.includes("indie")) {
                    document.getElementById('tier').value = "tier_indie";
                } else {
                    document.getElementById('tier').value = "tier_aaa"; 
                }

                // 4. Картинки
                const safeName = safeFilename(game.name);
                const coverUrl = game.header_image;
                const bannerUrl = game.screenshots && game.screenshots.length > 0 ? game.screenshots[0].path_full : null;

                // Показываем блок скачивания
                const imgSection = document.getElementById('imagesSection');
                imgSection.classList.remove('hidden');
                
                document.getElementById('previewCover').src = coverUrl;
                document.getElementById('linkCover').href = coverUrl;
                document.getElementById('nameCover').textContent = `${safeName}.jpg`;

                if (bannerUrl) {
                    document.getElementById('previewBanner').src = bannerUrl;
                    document.getElementById('linkBanner').href = bannerUrl;
                    document.getElementById('nameBanner').textContent = `${safeName}_banner.jpg`;
                    document.getElementById('hasBanner').checked = true;
                } else {
                    document.getElementById('hasBanner').checked = false;
                }

                status.textContent = "Успешно! Не забудь скачать картинки.";
                status.style.color = "#44bd32";
                updateOutput();

            } catch (e) {
                console.error(e);
                status.textContent = "Ошибка: " + e.message;
                status.style.color = "#ff453a";
            } finally {
                btn.disabled = false;
                btn.textContent = "Заполнить из Steam";
            }
        }

        function updateOutput() {
            const title = document.getElementById('title').value.trim();
            if (!title) return;

            const safeName = safeFilename(title);
            const id = "game_" + safeName;
            const hasBanner = document.getElementById('hasBanner').checked;
            const coverName = safeName + ".jpg";
            const bannerName = hasBanner ? safeName + "_banner.jpg" : null;
            const selectedTags = Array.from(document.querySelectorAll('.tags-grid input:checked')).map(cb => cb.value);

            const gameObj = {
                id: id,
                title: title,
                tier: document.getElementById('tier').value,
                tags: selectedTags,
                description: document.getElementById('desc').value.trim(),
                trailer: document.getElementById('trailer').value.trim(),
                assets: {
                    cover: coverName,
                    banner: bannerName
                }
            };

            document.getElementById('output').textContent = JSON.stringify(gameObj, null, 4) + ",";
            
            if (!document.getElementById('imagesSection').classList.contains('hidden')) {
                document.getElementById('nameCover').textContent = coverName;
                document.getElementById('nameBanner').textContent = bannerName || "(без баннера)";
            }
        }

        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('input', updateOutput);
            el.addEventListener('change', updateOutput);
        });
    </script>
</body>
</html>
