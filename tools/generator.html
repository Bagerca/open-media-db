<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cycle MediaDB Generator: Pro</title>
    <style>
        :root { --accent: #7c3aed; --bg-dark: #0a0a0c; --bg-mid: #141416; --bg-light: #1a1a1c; --border: #333; --text-light: #fff; --text-dim: #aaa; --green: #44bd32; --red: #ff453a; --yellow: #ffd700; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-dark); color: var(--text-light); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 400px; background: var(--bg-mid); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }
        h2, h3 { margin: 0; color: var(--text-light); font-weight: 700; }
        h2 span { color: var(--accent); }
        h3 { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; font-weight: 600; }
        input, select, textarea { width: 100%; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-light); padding: 12px; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }
        textarea { height: 100px; resize: vertical; line-height: 1.4; }
        .steam-box { background: rgba(124, 58, 237, 0.1); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; }
        .btn { background: var(--accent); color: var(--text-light); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: #6d28d9; transform: translateY(-2px); }
        .btn:disabled { background: #333; cursor: wait; transform: none; }
        .status-msg { font-size: 12px; margin-top: 8px; text-align: center; min-height: 15px; }
        .json-box { background: #000; border: 1px solid var(--border); border-radius: 12px; position: relative; }
        pre { color: var(--green); font-family: monospace; font-size: 13px; padding: 20px; margin: 0; overflow-x: auto; white-space: pre-wrap; max-height: 400px; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .copy-btn:hover { background: rgba(255,255,255,0.2); }
        .assets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .asset-card { background: var(--bg-mid); border: 1px solid var(--border); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; transition: 0.2s; }
        .asset-card:hover { border-color: #555; transform: translateY(-2px); }
        .img-wrapper { background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
        .img-wrapper.cover { aspect-ratio: 2/3; }
        .img-wrapper.banner, .img-wrapper.screen { aspect-ratio: 16/9; }
        .asset-card img { width: 100%; height: 100%; object-fit: cover; }
        .asset-meta { margin-top: auto; }
        .file-name { font-family: monospace; color: var(--accent); font-size: 11px; margin-bottom: 8px; word-break: break-all; }
        .download-btn { display: block; text-align: center; background: #222; color: #fff; text-decoration: none; font-size: 12px; padding: 8px; border-radius: 6px; transition: 0.2s; }
        .download-btn:hover { background: var(--accent); }
        .download-btn:disabled { background: #333; color: #888; cursor: wait; }
        .queue-item { display: flex; align-items: center; gap: 10px; background: var(--bg-light); padding: 8px; border-radius: 8px; border-left: 4px solid var(--border); }
        .queue-item.success { border-left-color: var(--green); }
        .queue-item.error { border-left-color: var(--red); }
        .queue-item.loading { border-left-color: var(--yellow); }
        .queue-icon { width: 20px; text-align: center; }
        .queue-info { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .remove-btn { background: none; border: none; color: #666; cursor: pointer; padding: 5px; font-size: 14px; }
        .remove-btn:hover { color: var(--red); }
        .spinner { width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Cycle <span>MediaDB</span></h2>
        <div class="steam-box">
            <label style="color: #fff;">1. Введи ID или ссылки (через запятую)</label>
            <input type="text" id="steamInput" placeholder="2825530, 3232610, ...">
            <button class="btn" id="fetchBtn" onclick="addGamesToQueue()"><span id="btnSpinner" class="spinner" style="display:none;"></span>+ Добавить в очередь</button>
            <div id="status" class="status-msg"></div>
        </div>
        <h3>Очередь обработки (<span id="queueCount">0</span>)</h3>
        <div id="queue" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
    <div class="main">
        <div>
            <h3>2. Сгенерированный JSON (для db/games.json)</h3>
            <div class="json-box">
                <button class="copy-btn" onclick="copyJSON()">Копировать</button>
                <pre id="output">// Добавь игры в очередь...</pre>
            </div>
        </div>
        <div id="assetsSection" style="display:none;">
            <h3>3. Скачать все ассеты</h3>
            <button class="btn" onclick="downloadAllAssets()" style="width: auto; padding: 10px 20px; margin-bottom: 20px;">Скачать всё (Обложки, Баннеры, Скриншоты)</button>
            <div id="assetsGrid"></div>
        </div>
    </div>
    <script>
        let gameQueue = [];
        const translitMap = { 'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ь':'','ы':'y','ъ':'','э':'e','ю':'yu','я':'ya'};
        function safeFilename(str) { return str.toLowerCase().split('').map(c => translitMap[c] || c).join('').replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, ''); }

        async function fetchWithFallback(url) {
            const proxies = [
                { name: "AllOrigins", build: u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, parse: async r => JSON.parse((await r.json()).contents) },
                { name: "CodeTabs", build: u => `https://api.codetabs.com/v1/proxy?quest=${u}`, parse: r => r.json() },
                { name: "CORS-Anywhere", build: u => `https://cors-anywhere.herokuapp.com/${u}`, parse: r => r.json() }
            ];
            for (let proxy of proxies) {
                try { const res = await fetch(proxy.build(url)); if (!res.ok) throw new Error(`HTTP ${res.status}`); return await proxy.parse(res); } catch (e) { console.warn(`${proxy.name} не сработал:`, e); }
            }
            throw new Error("Все прокси недоступны.");
        }

        async function addGamesToQueue() {
            let input = document.getElementById('steamInput').value.trim();
            const btn = document.getElementById('fetchBtn'), status = document.getElementById('status'), spinner = document.getElementById('btnSpinner');
            if (!input) return;

            btn.disabled = true; spinner.style.display = 'inline-block'; status.innerText = "";
            const ids = input.split(',').map(s => (s.match(/\/app\/(\d+)\//) || [])[1] || s.trim()).filter(Boolean);

            for (const appId of ids) {
                if (gameQueue.some(g => g.steam_id == appId)) { status.innerText = `Игра ${appId} уже в очереди`; continue; }
                
                let tempItem = { steam_id: appId, title: `Игра ${appId}`, status: 'loading' };
                gameQueue.push(tempItem);
                renderQueue();
                
                try {
                    const data = await fetchWithFallback(`https://store.steampowered.com/api/appdetails?appids=${appId}&l=russian`);
                    if (!data || !data[appId] || !data[appId].success) throw new Error("API не вернул данные");
                    
                    const game = data[appId].data;
                    const safeName = safeFilename(game.name);
                    const steamTagsList = [...(game.genres || []), ...(game.categories || [])];
                    const steamTagDescriptions = steamTagsList.map(t => t.description.toLowerCase());
                    
                    const processedGame = {
                        steam_id: appId, id: "game_" + safeName, title: game.name, tier: steamTagDescriptions.includes('инди') ? 'tier_indie' : 'tier_aaa',
                        tags: ALL_TAGS.filter(t => t.keys.some(k => steamTagDescriptions.includes(k))).map(t => t.id),
                        steam_tags: steamTagsList, description: game.short_description.replace(/<[^>]*>?/gm, ''), trailer: "",
                        assets: {
                            cover: { filename: `${safeName}.jpg`, url: `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/library_600x900_2x.jpg` },
                            banner: { filename: `${safeName}_banner.jpg`, url: game.header_image },
                            screenshots: (game.screenshots || []).map((scr, idx) => ({ filename: `${safeName}_screen_${idx+1}.jpg`, url: scr.path_full }))
                        },
                        status: 'success'
                    };
                    gameQueue[gameQueue.indexOf(tempItem)] = processedGame;

                } catch (e) {
                    console.error(e);
                    tempItem.status = 'error';
                    tempItem.error = e.message;
                } finally {
                    renderAll();
                }
            }
            btn.disabled = false; spinner.style.display = 'none';
            document.getElementById('steamInput').value = '';
        }
        
        function removeFromQueue(steamId) { gameQueue = gameQueue.filter(g => g.steam_id != steamId); renderAll(); }

        function renderAll() {
            renderQueue();
            updateOutput();
            renderAssets();
        }

        function renderQueue() {
            const queueEl = document.getElementById('queue');
            document.getElementById('queueCount').innerText = gameQueue.length;
            if (gameQueue.length === 0) { queueEl.innerHTML = `<div style="font-size:12px; color:#666; text-align:center; padding:10px;">Очередь пуста</div>`; return; }
            queueEl.innerHTML = gameQueue.map(g => `
                <div class="queue-item ${g.status}">
                    <div class="queue-icon">
                        ${g.status === 'loading' ? '<span class="spinner"></span>' : ''}
                        ${g.status === 'success' ? '<i style="color:var(--green)">✓</i>' : ''}
                        ${g.status === 'error' ? '<i style="color:var(--red)">✗</i>' : ''}
                    </div>
                    ${g.assets ? `<img src="${g.assets.cover.url}" loading="lazy">` : ''}
                    <div class="queue-info" title="${g.error || g.title}">${g.title}</div>
                    <button class="remove-btn" onclick="removeFromQueue('${g.steam_id}')" title="Удалить">&times;</button>
                </div>
            `).join('');
        }

        function updateOutput() {
            const outputEl = document.getElementById('output');
            const successfulGames = gameQueue.filter(g => g.status === 'success');
            if (successfulGames.length === 0) { outputEl.textContent = "// Добавьте игры в очередь..."; return; }
            const cleanQueue = successfulGames.map(g => ({
                id: g.id, title: g.title, tier: g.tier, tags: g.tags, steam_tags: g.steam_tags, description: g.description, trailer: g.trailer,
                assets: { cover: g.assets.cover.filename, banner: g.assets.banner.filename }
            }));
            outputEl.textContent = JSON.stringify(cleanQueue, null, 4);
        }

        function renderAssets() {
            const assetsSection = document.getElementById('assetsSection');
            const successfulGames = gameQueue.filter(g => g.status === 'success');
            assetsSection.style.display = successfulGames.length > 0 ? 'block' : 'none';
            const grid = document.getElementById('assetsGrid');
            grid.innerHTML = '';
            successfulGames.forEach(game => {
                const title = document.createElement('h3');
                title.innerText = game.title;
                title.style.gridColumn = '1 / -1'; title.style.marginTop = '10px';
                grid.appendChild(title);
                grid.appendChild(createAssetCard('Обложка', 'cover', game.assets.cover.url, game.assets.cover.filename));
                grid.appendChild(createAssetCard('Баннер', 'banner', game.assets.banner.url, game.assets.banner.filename));
                game.assets.screenshots.forEach((scr, idx) => grid.appendChild(createAssetCard(`Скриншот ${idx+1}`, 'screen', scr.url, scr.filename)));
            });
        }
        
        function createAssetCard(title, type, url, filename) {
            const card = document.createElement('div');
            card.className = 'asset-card';
            card.innerHTML = `
                <div style="font-size:12px; color:#aaa; margin-bottom:5px;">${title}</div>
                <div class="img-wrapper ${type}"><img src="${url}" loading="lazy"></div>
                <div class="asset-meta">
                    <div class="file-name">${filename}</div>
                    <a href="#" class="download-btn">Скачать</a>
                </div>`;
            card.querySelector('.download-btn').onclick = (e) => downloadAsset(e, url, filename);
            return card;
        }

        // НОВОЕ: Скачивает ВСЕ ассеты из очереди
        async function downloadAllAssets() {
            for (const game of gameQueue) {
                if (game.status !== 'success') continue;
                await downloadAsset({ preventDefault: () => {} }, game.assets.cover.url, game.assets.cover.filename);
                await sleep(300);
                await downloadAsset({ preventDefault: () => {} }, game.assets.banner.url, game.assets.banner.filename);
                await sleep(300);
                for (const scr of game.assets.screenshots) {
                    await downloadAsset({ preventDefault: () => {} }, scr.url, scr.filename);
                    await sleep(300);
                }
            }
        }

        async function downloadAsset(event, url, filename) {
            event.preventDefault();
            const btn = event.currentTarget;
            btn.innerText = "Загрузка...";
            btn.disabled = true;

            try {
                // Используем прокси для скачивания, чтобы избежать блокировки CORS
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // AllOrigins возвращает картинку в base64, конвертируем ее обратно в blob
                const blob = await (await fetch(data.contents)).blob();

                const tempUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = tempUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(tempUrl);
                btn.innerText = "Скачано!";
                btn.style.background = 'var(--green)';
            } catch (e) {
                console.error("Ошибка скачивания:", e);
                btn.innerText = "Ошибка";
                btn.style.background = 'var(--red)';
            } finally {
                setTimeout(() => {
                    btn.innerText = "Скачать";
                    btn.style.background = "#222";
                    btn.disabled = false;
                }, 3000);
            }
        }

        function copyJSON() {
            navigator.clipboard.writeText(document.getElementById('output').textContent).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerText = "Скопировано!";
                setTimeout(() => btn.innerText = "Копировать", 2000);
            });
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

    </script>
</body>
</html>
