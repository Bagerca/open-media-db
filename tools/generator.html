<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle MediaDB Ultimate</title>
    <!-- Подключаем нужные библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        /* --- CYCLE DESIGN SYSTEM --- */
        :root {
            --bg-base: #060606;
            --bg-panel: #121212;
            --bg-input: #1a1a1a;
            --bg-hover: #222222;
            --border-subtle: #262626;
            --border-focus: #3f3f46;
            
            --text-main: #ffffff;
            --text-muted: #888888;
            
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            
            --status-success: #10b981;
            --status-process: #f59e0b;
            --status-error: #ef4444;

            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-pill: 9999px;
            
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: var(--font-sans); background-color: var(--bg-base);
            color: var(--text-main); height: 100vh; display: flex; overflow: hidden; font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SCROLLBARS --- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: var(--radius-pill); }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- LAYOUT --- */
        .sidebar { width: 440px; background: var(--bg-base); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); }

        /* --- TYPOGRAPHY & HEADERS --- */
        .header-panel { padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar .header-panel { padding: 24px; border-bottom: 1px solid var(--border-subtle); gap: 10px; }
        h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; } h1 span { color: var(--accent); }
        h2 { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 16px; }

        /* --- BUTTONS --- */
        .btn { background: var(--text-main); color: var(--bg-base); border: none; padding: 10px 20px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.1s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover:not(:disabled) { opacity: 0.9; transform: scale(0.98); } .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-subtle); }
        .btn-secondary:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--border-focus); }
        .btn-ghost { background: transparent; color: var(--text-muted); padding: 8px 16px; border-radius: var(--radius-pill); font-weight: 500; cursor: pointer; border: none; transition: 0.2s; font-size: 13px;}
        .btn-ghost:hover { color: var(--text-main); background: var(--bg-panel); }
        .btn-icon { background: var(--bg-input); border: none; color: var(--text-muted); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-icon:hover { background: var(--border-subtle); color: var(--text-main); }
        .btn-icon.danger:hover { background: rgba(239, 68, 68, 0.2); color: var(--status-error); }
        .btn-icon.retry:hover { background: rgba(16, 185, 129, 0.2); color: var(--status-success); }

        /* --- INPUTS --- */
        textarea, input, select { width: 100%; background: var(--bg-input); border: 1px solid transparent; color: var(--text-main); padding: 12px 16px; border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: 13px; transition: 0.2s ease; resize: vertical; }
        textarea:focus, input:focus, select:focus { background: var(--bg-hover); border-color: var(--border-subtle); }
        textarea::placeholder, input::placeholder { color: #555; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }

        /* --- TOOLBAR --- */
        .toolbar { padding: 16px 24px; background: var(--bg-panel); border-bottom: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 12px; }
        .toolbar-row { display: flex; gap: 12px; align-items: center; }
        
        .bulk-errors-panel { display: none; padding: 10px 16px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: var(--radius-sm); justify-content: space-between; align-items: center; }
        .bulk-errors-panel.show { display: flex; }
        .bulk-errors-title { color: var(--status-error); font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 6px; }

        /* --- QUEUE LIST --- */
        .queue-container { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        
        .queue-item { display: flex; gap: 14px; padding: 12px; background: var(--bg-base); border-radius: var(--radius-md); align-items: center; border: 1px solid var(--border-subtle); transition: border 0.2s, background 0.2s; position: relative; }
        .queue-item:hover { border-color: var(--border-focus); background: var(--bg-panel); }
        
        /* Drag Handle Icon */
        .drag-handle { color: #444; font-size: 18px; cursor: grab; display: flex; align-items: center; padding: 0 4px; transition: color 0.2s; }
        .queue-item:hover .drag-handle { color: var(--text-muted); }
        .drag-handle:active { cursor: grabbing; }

        /* --- СТИЛИ SORTABLEJS (DRAG & DROP) --- */
        
        /* 1. Силуэт-призрак (Куда упадет карточка) */
        .sortable-ghost {
            background: rgba(139, 92, 246, 0.08) !important; /* Легкая фиолетовая заливка */
            border: 2px dashed var(--accent) !important; /* Пунктирная граница */
            border-radius: var(--radius-md) !important;
            box-shadow: none !important;
        }
        /* Делаем всё содержимое внутри силуэта невидимым, чтобы была просто рамка */
        .sortable-ghost > * {
            opacity: 0 !important;
        }

        /* 2. Сама карточка, которую мы тащим мышкой */
        .sortable-drag {
            background: var(--bg-hover) !important;
            border: 1px solid var(--border-focus) !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9) !important; /* Глубокая тень */
            opacity: 1 !important;
            cursor: grabbing !important;
        }

        .q-thumb { width: 40px; height: 56px; background: var(--bg-input); border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; }
        .q-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
        .q-header-row { display: flex; align-items: center; gap: 8px; }
        .q-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot.success { background: var(--status-success); box-shadow: 0 0 8px var(--status-success); }
        .dot.error { background: var(--status-error); box-shadow: 0 0 8px var(--status-error); }
        .dot.processing { background: var(--status-process); box-shadow: 0 0 10px var(--status-process); animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.4; box-shadow: 0 0 2px var(--status-process); } to { opacity: 1; box-shadow: 0 0 12px var(--status-process); } }

        .badges-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .q-id-badge { display: inline-flex; align-items: center; background: var(--bg-input); border: 1px solid var(--border-subtle); color: var(--text-muted); font-family: var(--font-mono); font-size: 10px; padding: 4px 6px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .q-id-badge:hover { background: #2a2a2a; color: #fff; border-color: var(--border-focus); }

        /* --- MAIN AREA --- */
        .main-content { flex: 1; overflow-y: auto; padding: 0 32px 32px 32px; display: flex; flex-direction: column; gap: 40px; }
        .json-section { display: flex; flex-direction: column; }
        .json-box { background: var(--bg-panel); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); position: relative; height: 350px; overflow: hidden; }
        .json-box pre { margin: 0; padding: 24px; color: #a5b4fc; font-family: var(--font-mono); font-size: 13px; height: 100%; overflow: auto; line-height: 1.6; }
        .copy-json-btn { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; }

        .game-asset-group { background: var(--bg-panel); border-radius: var(--radius-md); padding: 24px; margin-bottom: 24px; }
        .game-asset-header { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .game-asset-header .badge { font-family: var(--font-mono); font-size: 12px; font-weight: 400; color: var(--text-muted); background: var(--bg-base); padding: 4px 8px; border-radius: 6px; }
        
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .asset-card { display: flex; flex-direction: column; gap: 10px; }
        .asset-img-wrap { width: 100%; aspect-ratio: 16/9; background: var(--bg-input); border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: center; position: relative; }
        .asset-img-wrap.is-cover { aspect-ratio: 2/3; }
        .asset-img-wrap.is-logo { background: #1a1a1a; }
        .asset-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .asset-img-wrap.is-logo img { object-fit: contain; padding: 15px; }
        .asset-img-wrap:hover img { transform: scale(1.03); }
        
        .asset-info { display: flex; flex-direction: column; gap: 4px; }
        .asset-type { font-size: 12px; font-weight: 700; color: var(--text-main); }
        .asset-name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .asset-actions { display: flex; gap: 8px; }

        /* --- LIGHTBOX --- */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; cursor: zoom-out; opacity: 0; transition: opacity 0.3s; }
        #lightbox.show { display: flex; opacity: 1; }
        #lightbox img { max-width: 90%; max-height: 90vh; border-radius: var(--radius-md); box-shadow: 0 20px 50px rgba(0,0,0,0.8); object-fit: contain; }

        /* --- TOAST --- */
        #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text-main); color: var(--bg-base); padding: 14px 24px; border-radius: var(--radius-pill); box-shadow: 0 10px 40px rgba(0,0,0,0.5); font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; display: flex; align-items: center; gap: 10px; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.error { background: var(--status-error); color: #fff; }

        /* --- MODAL --- */
        dialog { margin: auto; background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); width: 700px; max-width: 95vw; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-height: 90vh; overflow-y: auto; }
        dialog::backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .modal-col-full { grid-column: span 2; }
    </style>
</head>
<body>

    <div id="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src="" alt="Zoom"></div>

    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="handleImport(event)">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="header-panel">
            <h1>Cycle <span>MediaDB</span></h1>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary" title="Импорт JSON базы" style="padding: 8px; border-radius: 50%; width: 36px; height: 36px;" onclick="document.getElementById('importFile').click()">📥</button>
                <button class="btn btn-secondary" style="padding: 8px 16px;" onclick="document.getElementById('customModal').showModal()">+ Custom</button>
            </div>
        </div>
        
        <div style="padding: 24px; padding-bottom: 16px;">
            <label>STEAM ID (Массовый ввод)</label>
            <div style="display: flex; gap: 8px;">
                <textarea id="steamInput" placeholder="1089980 400..." rows="2" style="flex: 1;"></textarea>
                <button class="btn" style="padding: 0 20px;" onclick="addToQueue()">Парсинг</button>
            </div>
        </div>

        <!-- TOOLBAR (Search, Sort, Bulk actions) -->
        <div class="toolbar">
            <div class="toolbar-row">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по названию или ID..." oninput="filterQueue()" style="flex: 2;">
                <select id="sortSelect" onchange="sortQueue()" style="flex: 1; cursor: pointer;">
                    <option value="newest">Порядок</option>
                    <option value="az">А-Я</option>
                    <option value="za">Я-А</option>
                </select>
            </div>

            <!-- Panel for Bulk Errors -->
            <div class="bulk-errors-panel" id="bulkErrorsPanel">
                <div class="bulk-errors-title">
                    <span class="dot error"></span> Найдено ошибок: <span id="errCountText">0</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-ghost" style="padding: 4px 8px; font-size: 11px; background: rgba(239,68,68,0.2); color: #fff;" onclick="retryAllErrors()">↻ Повторить</button>
                    <button class="btn-ghost" style="padding: 4px 8px; font-size: 11px;" onclick="clearAllErrors()">✕ Удалить</button>
                </div>
            </div>
        </div>

        <div style="padding: 16px 24px 0 24px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 13px; font-weight: 700; color: var(--text-muted);">ОЧЕРЕДЬ (<span id="queueCount" style="color: #fff;">0</span>)</span>
            <button class="btn-ghost" style="padding: 4px 8px; font-size: 11px;" onclick="clearQueue()">Очистить всё</button>
        </div>

        <div id="queueList" class="queue-container">
            <!-- Queue items -->
        </div>
    </div>

    <!-- MAIN AREA -->
    <div class="main">
        <div class="header-panel">
            <div style="display: flex; align-items: center; gap: 16px;">
                <h1 style="font-size: 18px;">База данных</h1>
                <div id="globalSpinner" style="display: none; align-items: center; gap: 8px; color: var(--status-process); font-weight: 600; font-size: 13px;">
                    <div class="dot processing"></div> Загрузка...
                </div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-secondary" onclick="downloadZip('logo', this)">ZIP Лого</button>
                <button class="btn btn-secondary" onclick="downloadZip('cover', this)">ZIP Обложки</button>
                <button class="btn btn-secondary" onclick="downloadZip('banner', this)">ZIP Баннеры</button>
                <button class="btn btn-secondary" onclick="downloadZip('screenshots', this)">ZIP Скрины</button>
            </div>
        </div>

        <div class="main-content">
            <!-- JSON BLOCK -->
            <div class="json-section">
                <h2>Код (JSON)</h2>
                <div class="json-box">
                    <div class="copy-json-btn">
                        <button class="btn btn-secondary" onclick="copyJson()">📋 Копировать</button>
                        <button class="btn" style="background: var(--text-main); color: var(--bg-base);" onclick="downloadJsonFile()">💾 Скачать .json</button>
                    </div>
                    <pre id="jsonOutput">// Игры появятся здесь...</pre>
                </div>
            </div>

            <!-- ASSETS BLOCK -->
            <div class="json-section" style="padding-bottom: 40px;">
                <h2>Медиафайлы</h2>
                <div id="assetsManager">
                    <div style="color: var(--text-muted); font-size: 14px; background: var(--bg-panel); padding: 24px; border-radius: var(--radius-md);">
                        Ассеты появятся после успешной обработки игр.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CUSTOM MODAL -->
    <dialog id="customModal">
        <h2 style="margin-bottom: 24px; font-size: 20px;">Новая Custom Игра</h2>
        <div class="modal-grid">
            <div><label>Название игры</label><input type="text" id="cTitle" oninput="document.getElementById('cId').value = 'game_' + safeName(this.value)"></div>
            <div><label>ID (Автогенерация)</label><input type="text" id="cId" readonly style="color: var(--text-muted);"></div>
            <div class="modal-col-full"><label>Описание</label><textarea id="cDesc" rows="2"></textarea></div>
            <div class="modal-col-full"><label>Теги (через запятую)</label><input type="text" id="cTags"></div>
            <div><label>URL Логотипа (PNG)</label><input type="text" id="cLogo"></div>
            <div><label>URL Вертикальной обложки</label><input type="text" id="cCover"></div>
            <div class="modal-col-full"><label>URL Горизонтального баннера</label><input type="text" id="cBanner"></div>
            <div class="modal-col-full"><label>URL Скриншотов (с новой строки)</label><textarea id="cScreens" rows="3"></textarea></div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:16px;">
            <button class="btn btn-ghost" onclick="document.getElementById('customModal').close()">Отмена</button>
            <button class="btn" onclick="saveCustomGame()">Сохранить игру</button>
        </div>
    </dialog>

    <div id="toast"></div>

    <script>
        const AAA_PUBLISHERS =['playstation', 'xbox', 'electronic arts', 'ea', 'ubisoft', 'activision', 'blizzard', 'bethesda', 'rockstar', '2k', 'capcom', 'sega', 'bandai namco', 'square enix', 'konami', 'warner bros', 'take-two', 'cd projekt', 'microsoft', 'sony', 'nintendo', 'valve', 'riot games', 'epic games', 'bungie', 'netease', 'tencent', 'amazon games', 'focus entertainment', 'thq nordic', 'paradox interactive', 'remedy', '505 games', 'deep silver', 'private division'];
        const translit = { 'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ь':'','ы':'y','ъ':'','э':'e','ю':'yu','я':'ya' };

        let queue =[];
        let isProcessing = false;
        let searchQuery = "";
        let sortableInstance = null; // Инстанс библиотеки Drag & Drop

        // --- LOCAL STORAGE ---
        function saveState() { localStorage.setItem('cycle_mediadb_queue_v3', JSON.stringify(queue)); }
        function loadState() {
            const saved = localStorage.getItem('cycle_mediadb_queue_v3');
            if (saved) { try { queue = JSON.parse(saved); renderQueue(); renderOutputs(); } catch(e) {} }
        }

        // --- UTILS ---
        function safeName(str) { return str.toLowerCase().replace(/[™®©]/g, '').split('').map(c => translit[c] || c).join('').replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, ''); }
        function decodeHtml(html) { const t = document.createElement("textarea"); t.innerHTML = html; return t.value; }
        function cleanText(str) { return decodeHtml((str || "").replace(/<[^>]*>?/gm, ' ').replace(/\s+/g, ' ').trim()); }
        
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            if(isError) t.classList.add('error'); else t.classList.remove('error');
            t.innerHTML = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        function copyToClip(text, label = "Текст") { navigator.clipboard.writeText(text); showToast(`${label} скопирован!`); }
        function formatDate(str) { if (!str || /soon|tba/i.test(str)) return "TBA"; const d = new Date(str); return isNaN(d.getTime()) ? str : d.toISOString().split('T')[0]; }

        function openLightbox(url) { document.getElementById('lightboxImg').src = url; document.getElementById('lightbox').classList.add('show'); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); setTimeout(() => { document.getElementById('lightboxImg').src = ''; }, 300); }

        // --- IMPORT JSON ---
        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    let added = 0;
                    data.reverse().forEach(g => {
                        if (!queue.some(q => q.id === g.id)) {
                            queue.unshift({
                                steam_id: g.steam_id || 'custom_' + Math.random().toString(36).substr(2,9),
                                id: g.id, title: g.title, tier: g.tier,
                                developer: g.developer, publisher: g.publisher, release_date: g.release_date, tags: g.tags,
                                description: g.description, specs: g.specs || {minimum:'', recommended:''}, trailer: g.trailer,
                                assets: {
                                    logo: g.assets.logo ? { url: `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${g.steam_id}/logo.png`, file: g.assets.logo } : null,
                                    cover: { url: `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${g.steam_id}/library_600x900_2x.jpg`, file: g.assets.cover },
                                    banner: { url: `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${g.steam_id}/header.jpg`, file: g.assets.banner },
                                    screenshots: g.assets.screenshots ? g.assets.screenshots.map(s => ({ url: '', file: s })) :[]
                                },
                                status: 'success', type: g.steam_id ? 'steam' : 'custom'
                            });
                            added++;
                        }
                    });
                    saveState(); renderQueue(); renderOutputs();
                    showToast(`✅ Успешно импортировано: ${added} игр`);
                } catch(err) { showToast('❌ Ошибка чтения файла JSON', true); }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        // --- NETWORKING ---
        async function fetchApi(url, type = 'json') {
            const proxies =[ u => `https://corsproxy.io/?${encodeURIComponent(u)}`, u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`, u => `https://api.codetabs.com/v1/proxy?quest=${u}` ];
            for (const p of proxies) {
                try {
                    const res = await fetch(p(url)); if (!res.ok) throw new Error(res.status);
                    return type === 'json' ? await res.json() : (type === 'blob' ? await res.blob() : await res.text());
                } catch (e) { continue; }
            }
            throw new Error('Proxy fail');
        }
        async function fetchBlobSafe(url, fallback) { try { return await fetchApi(url, 'blob'); } catch (e) { if (fallback) return await fetchApi(fallback, 'blob'); throw e; } }

        function parseRequirements(pcReqs) {
            let specs = { minimum: "", recommended: "" };
            if (!pcReqs || Array.isArray(pcReqs)) return specs;
            const cleanReq = (html) => html ? html.replace(/<br>/g, '\n').replace(/<[^>]+>/g, '').replace(/Minimum:|Recommended:/i, '').split('\n').map(l=>l.trim()).filter(l=>l.length>2).join(' | ') : "";
            if (pcReqs.minimum) specs.minimum = cleanReq(pcReqs.minimum);
            if (pcReqs.recommended) specs.recommended = cleanReq(pcReqs.recommended);
            return specs;
        }

        async function fetchSteamData(appId) {
            const ruData = await fetchApi(`https://store.steampowered.com/api/appdetails?appids=${appId}&l=russian`, 'json');
            if (!ruData || !ruData[appId] || !ruData[appId].success) throw new Error("Not found");
            
            const g = ruData[appId].data;
            let englishName = g.name, tags =[];
            try {
                const html = await fetchApi(`https://store.steampowered.com/app/${appId}/?l=english`, 'text');
                const nameM = html.match(/<div class="apphub_AppName">([^<]+)<\/div>/);
                if (nameM) englishName = decodeHtml(nameM[1].trim());
                const glanceM = html.match(/<div class="glance_tags popular_tags">([\s\S]*?)<\/div>/);
                const tagM = (glanceM ? glanceM[1] : html).matchAll(/<a[^>]*class="app_tag"[^>]*>([^<]*)<\/a>/g);
                tags = Array.from(tagM).map(m => decodeHtml(m[1].trim()));
            } catch (e) {}

            if (!tags.length) { try { const spy = await fetchApi(`https://steamspy.com/api.php?request=appdetails&appid=${appId}`, 'json'); if (spy && spy.tags) tags = Object.keys(spy.tags); } catch(e) {} }

            const sName = safeName(englishName);
            const pubs = (g.publishers||[]).join(', ').toLowerCase();
            const tier = AAA_PUBLISHERS.some(p => pubs.includes(p)) ? 'tier_aaa' : (tags.some(t => t.toLowerCase() === 'indie') ? 'tier_indie' : 'tier_standard');

            return {
                steam_id: appId, id: "game_" + sName, title: g.name, tier: tier,
                developer: (g.developers||[]).join(', '), publisher: (g.publishers||[]).join(', '),
                release_date: formatDate(g.release_date?.date), tags: tags, description: cleanText(g.short_description),
                specs: parseRequirements(g.pc_requirements), trailer: (g.movies?.[0]?.mp4?.max || "").split('?')[0],
                assets: {
                    logo: { url: `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/logo.png`, file: `${sName}_logo.png` },
                    cover: { url: `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/library_600x900_2x.jpg`, file: `${sName}.jpg`, fallback: g.header_image },
                    banner: { url: g.header_image, file: `${sName}_banner.jpg` },
                    screenshots: (g.screenshots||[]).slice(0, 6).map((s,i) => ({ url: s.path_full.split('?')[0], file: `${sName}_screen_${i+1}.jpg` }))
                },
                status: 'success', type: 'steam'
            };
        }

        // --- QUEUE ENGINE ---
        function addToQueue() {
            const ids = document.getElementById('steamInput').value.match(/(\d{3,})/g);
            if (!ids) return showToast('ID не найдены', true);
            
            ids.reverse().forEach(id => {
                if (!queue.some(x => x.steam_id == id)) queue.unshift({ steam_id: id, title: `ID: ${id}`, status: 'pending' });
            });
            
            document.getElementById('steamInput').value = '';
            saveState(); renderQueue(); processQueue();
        }

        async function processQueue() {
            if (isProcessing) return;
            isProcessing = true; document.getElementById('globalSpinner').style.display = 'flex';

            while (true) {
                const item = queue.find(i => i.status === 'pending');
                if (!item) break;
                item.status = 'processing'; renderQueue();

                try {
                    await new Promise(r => setTimeout(r, 600 + Math.random()*800)); 
                    const data = await fetchSteamData(item.steam_id);
                    Object.assign(item, data);
                    item.status = 'success';
                } catch (e) { item.status = 'error'; item.error = e.message; }
                saveState(); renderQueue(); renderOutputs();
            }

            isProcessing = false; document.getElementById('globalSpinner').style.display = 'none';
        }

        function removeGame(sid) { queue = queue.filter(x => x.steam_id != sid); saveState(); renderQueue(); renderOutputs(); }
        function clearQueue() { if(confirm('Очистить базу?')) { queue =[]; saveState(); renderQueue(); renderOutputs(); } }

        // --- BULK ERRORS ---
        function checkBulkErrors() {
            const errCount = queue.filter(q => q.status === 'error').length;
            const panel = document.getElementById('bulkErrorsPanel');
            if (errCount > 0) { panel.classList.add('show'); document.getElementById('errCountText').innerText = errCount; } 
            else { panel.classList.remove('show'); }
        }
        function retryAllErrors() { queue.forEach(q => { if(q.status === 'error') { q.status = 'pending'; delete q.error; } }); saveState(); renderQueue(); processQueue(); }
        function clearAllErrors() { queue = queue.filter(q => q.status !== 'error'); saveState(); renderQueue(); renderOutputs(); }
        function retryGame(sid) { const item = queue.find(x => x.steam_id == sid); if (item) { item.status = 'pending'; delete item.error; saveState(); renderQueue(); processQueue(); } }

        // --- FILTER & SORT ---
        function filterQueue() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); renderQueue(); }
        function sortQueue() {
            const type = document.getElementById('sortSelect').value;
            if (type === 'az') queue.sort((a,b) => a.title.localeCompare(b.title));
            if (type === 'za') queue.sort((a,b) => b.title.localeCompare(a.title));
            saveState(); renderQueue(); renderOutputs();
        }

        // --- RENDERING (WITH SORTABLE JS DRAG AND DROP) ---
        function renderQueue() {
            const el = document.getElementById('queueList');
            document.getElementById('queueCount').innerText = queue.length;
            checkBulkErrors();
            
            const isSearching = searchQuery.length > 0;
            const filtered = queue.filter(i => i.title.toLowerCase().includes(searchQuery) || i.steam_id.toString().includes(searchQuery));
            
            if (!filtered.length) {
                if (sortableInstance) sortableInstance.destroy(); // Убиваем Drag&Drop если список пуст
                return el.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:40px;">Ничего не найдено</div>';
            }

            el.innerHTML = filtered.map(i => {
                let dotClass = 'processing'; if(i.status === 'success') dotClass = 'success'; if(i.status === 'error') dotClass = 'error'; if(i.status === 'pending') dotClass = ''; 
                const isCustom = i.steam_id.toString().startsWith('custom');

                return `
                <div class="queue-item" data-id="${i.steam_id}">
                    ${!isSearching ? `<div class="drag-handle" title="Перетащить">⠿</div>` : ''}
                    ${i.assets ? `<img src="${i.assets.cover.url}" class="q-thumb" onerror="this.src='https://via.placeholder.com/40x56/1a1a1a/555'">` : '<div class="q-thumb"></div>'}
                    <div class="q-info">
                        <div class="q-header-row"><div class="dot ${dotClass}" ${i.status==='pending'?'style="background:#555"':''}></div><div class="q-title" title="${i.title}">${i.title}</div></div>
                        <div class="badges-row">
                            ${!isCustom ? `<div class="q-id-badge" onclick="copyToClip('${i.steam_id}', 'Steam ID')">#${i.steam_id}</div>` : ''}
                            ${i.id ? `<div class="q-id-badge" onclick="copyToClip('${i.id}', 'ID')">${i.id}</div>` : ''}
                        </div>
                        ${i.error ? `<div style="color: var(--status-error); font-size: 11px;">${i.error}</div>` : ''}
                    </div>
                    <div style="display: flex; gap: 4px; flex-shrink:0;">
                        ${i.status === 'error' ? `<button class="btn-icon retry" title="Повторить" onclick="retryGame('${i.steam_id}')">↻</button>` : ''}
                        <button class="btn-icon danger" onclick="removeGame('${i.steam_id}')">✕</button>
                    </div>
                </div>`;
            }).join('');

            // --- Инициализация плавного Drag & Drop ---
            if (sortableInstance) sortableInstance.destroy(); // Сбрасываем старый инстанс
            
            if (!isSearching) {
                sortableInstance = new Sortable(el, {
                    animation: 250, // Плавность разъезжания элементов (мс)
                    easing: "cubic-bezier(0.25, 1, 0.5, 1)", // Кривая анимации
                    handle: '.drag-handle', // За что тянуть
                    ghostClass: 'sortable-ghost', // Класс для "силуэта" ячейки
                    dragClass: 'sortable-drag', // Класс для карточки, которая висит на курсоре
                    onEnd: function (evt) {
                        if (evt.oldIndex === evt.newIndex) return; // Если не сдвинули
                        
                        // Меняем порядок в массиве queue
                        const item = queue.splice(evt.oldIndex, 1)[0];
                        queue.splice(evt.newIndex, 0, item);
                        
                        saveState();
                        renderOutputs(); // Обновляем JSON без ререндера списка, т.к. Sortable уже сдвинул DOM
                    }
                });
            }
        }

        function renderOutputs() {
            const success = queue.filter(i => i.status === 'success');
            
            const json = success.map(g => ({
                id: g.id, steam_id: parseInt(g.steam_id) || null, title: g.title, tier: g.tier,
                developer: g.developer, publisher: g.publisher, release_date: g.release_date, tags: g.tags,
                description: g.description, specs: g.specs, trailer: g.trailer,
                assets: { logo: g.assets.logo?.file || null, cover: g.assets.cover.file, banner: g.assets.banner.file, screenshots: g.assets.screenshots.map(s => s.file) }
            }));
            document.getElementById('jsonOutput').textContent = success.length ? JSON.stringify(json, null, 4) : '// Игры появятся здесь...';

            const am = document.getElementById('assetsManager');
            if(!success.length) { am.innerHTML = '<div style="color: var(--text-muted); font-size: 14px; background: var(--bg-panel); padding: 24px; border-radius: var(--radius-md);">Ассеты появятся после успешной обработки игр.</div>'; return; }

            let amHtml = '';
            success.forEach(g => {
                amHtml += `
                <div class="game-asset-group">
                    <div class="game-asset-header">${g.title} <span class="badge">${g.id}</span></div>
                    <div class="asset-grid">
                        ${g.assets.logo ? buildCard(g.assets.logo.url, g.assets.logo.file, 'Логотип', false, null, true) : ''}
                        ${buildCard(g.assets.cover.url, g.assets.cover.file, 'Обложка', true, g.assets.cover.fallback)}
                        ${buildCard(g.assets.banner.url, g.assets.banner.file, 'Баннер', false)}
                        ${g.assets.screenshots.map((s, i) => buildCard(s.url, s.file, `Скриншот ${i+1}`, false)).join('')}
                    </div>
                </div>`;
            });
            am.innerHTML = amHtml;
        }

        function buildCard(url, file, type, isCover=false, fallback=null, isLogo=false) {
            if(!url) return ''; 
            const fbStr = fallback ? `,'${fallback}'` : ',null';
            return `
            <div class="asset-card">
                <div class="asset-img-wrap ${isCover ? 'is-cover' : ''} ${isLogo ? 'is-logo' : ''}"><img src="${url}" loading="lazy" onerror="this.src='https://via.placeholder.com/300/1a1a1a/555?text=NO+IMAGE'"></div>
                <div class="asset-info"><span class="asset-type">${type}</span><span class="asset-name" title="${file}">${file}</span></div>
                <div class="asset-actions">
                    <button class="btn btn-secondary" style="flex: 1; padding: 6px; font-size: 12px;" onclick="dlSingleFile('${url}', '${file}', this ${fbStr})">Скачать</button>
                    <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 14px;" title="Развернуть" onclick="openLightbox('${url}')">👁</button>
                </div>
            </div>`;
        }

        // --- DOWNLOAD ACTIONS ---
        function copyJson() { copyToClip(document.getElementById('jsonOutput').textContent, 'JSON'); }
        function downloadJsonFile() {
            const content = document.getElementById('jsonOutput').textContent;
            if(content.includes('// Игры появятся здесь')) return showToast('Нет данных', true);
            saveAs(new Blob([content], { type: "application/json;charset=utf-8" }), "games.json"); showToast('✅ Файл сохранен');
        }

        async function dlSingleFile(url, filename, btn, fallback) {
            const oldHtml = btn.innerHTML; btn.innerHTML = '...'; btn.disabled = true;
            try { saveAs(await fetchBlobSafe(url, fallback), filename); btn.innerHTML = '✓'; } 
            catch (e) { btn.innerHTML = '✕'; showToast(`Ошибка: ${filename}`, true); }
            setTimeout(() => { btn.innerHTML = oldHtml; btn.disabled = false; }, 2000);
        }

        async function downloadZip(type, btn) {
            const items = queue.filter(i => i.status === 'success');
            if (!items.length) return showToast('Нет данных', true);
            const oldText = btn.innerHTML; btn.innerHTML = 'Упаковка...'; btn.disabled = true;

            const zip = new JSZip(); const folder = zip.folder(type);
            for (const g of items) {
                if(!g.assets) continue;
                if (type === 'logo' && g.assets.logo?.url) { try { folder.file(g.assets.logo.file, await fetchBlobSafe(g.assets.logo.url)); } catch(e){} } 
                else if (type === 'cover' && g.assets.cover?.url) { try { folder.file(g.assets.cover.file, await fetchBlobSafe(g.assets.cover.url, g.assets.cover.fallback)); } catch(e){} } 
                else if (type === 'banner' && g.assets.banner?.url) { try { folder.file(g.assets.banner.file, await fetchBlobSafe(g.assets.banner.url)); } catch(e){} } 
                else if (type === 'screenshots' && g.assets.screenshots) { for (const s of g.assets.screenshots) { if(s.url) try { folder.file(s.file, await fetchBlobSafe(s.url)); } catch(e){} } }
            }
            btn.innerHTML = 'Сохранение...';
            try { saveAs(await zip.generateAsync({type:"blob"}), `${type}_assets.zip`); showToast('Архив сохранён'); } 
            catch(e) { showToast('Ошибка создания ZIP', true); }
            btn.innerHTML = oldText; btn.disabled = false;
        }

        // Init
        window.onload = loadState;
    </script>
</body>
</html>
