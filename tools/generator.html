<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle MediaDB: Pro</title>
    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg-body: #09090b;
            --bg-panel: #18181b;
            --bg-element: #27272a;
            --border: #3f3f46;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --green: #10b981;
            --red: #ef4444;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* --- LAYOUT --- */
        .sidebar { width: 400px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 2; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border); background: var(--bg-panel); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .main-header { padding: 20px; border-bottom: 1px solid var(--border); background: var(--bg-panel); display: flex; justify-content: space-between; align-items: center; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }

        /* --- TYPOGRAPHY --- */
        h1 { font-size: 20px; font-weight: 800; } h1 span { color: var(--accent); }
        h2 { font-size: 16px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 600; color: var(--text-dim); display: block; margin-bottom: 6px; }

        /* --- COMPONENTS --- */
        .btn { background: var(--accent); color: #fff; border: none; padding: 10px 16px; border-radius: var(--radius); cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.6; cursor: wait; }
        .btn.secondary { background: var(--bg-element); color: var(--text-main); border: 1px solid var(--border); }
        .btn.secondary:hover { border-color: var(--text-dim); }
        .btn.full { width: 100%; }
        .btn.small { padding: 4px 8px; font-size: 11px; height: auto; }

        input, textarea, select { width: 100%; background: var(--bg-body); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: var(--radius); font-size: 13px; transition: 0.2s; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }

        /* --- QUEUE LIST --- */
        .queue-list { display: flex; flex-direction: column; gap: 8px; }
        .queue-item { background: var(--bg-element); padding: 10px; border-radius: var(--radius); display: flex; align-items: center; gap: 12px; border: 1px solid transparent; transition: 0.2s; position: relative; overflow: hidden; }
        .queue-item:hover { border-color: var(--border); }
        .queue-item.success { border-left: 3px solid var(--green); }
        .queue-item.error { border-left: 3px solid var(--red); }
        .queue-item.loading { border-left: 3px solid var(--accent); opacity: 0.8; }
        
        .q-img { width: 30px; height: 45px; background: #000; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
        .q-details { flex: 1; min-width: 0; }
        .q-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .q-status { font-size: 11px; color: var(--text-dim); }
        .q-remove { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; font-size: 16px; }
        .q-remove:hover { color: var(--red); }

        /* --- ASSETS GRID --- */
        .assets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .asset-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; }
        .asset-preview { aspect-ratio: 16/9; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 10px; position: relative; }
        .asset-preview.cover { aspect-ratio: 2/3; }
        .asset-preview img { width: 100%; height: 100%; object-fit: cover; }
        .asset-name { font-family: monospace; font-size: 11px; color: var(--accent); margin-bottom: 8px; word-break: break-all; text-align: center; }

        /* --- JSON BOX --- */
        .json-box { position: relative; background: #000; border: 1px solid var(--border); border-radius: var(--radius); height: 300px; overflow: hidden; }
        pre { color: var(--green); font-family: monospace; font-size: 12px; padding: 20px; margin: 0; height: 100%; overflow: auto; }
        .copy-icon { position: absolute; top: 10px; right: 10px; }

        /* --- MODAL (DIALOG) --- */
        dialog {
            background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border);
            border-radius: 12px; padding: 0; width: 500px; max-width: 90vw;
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        dialog::backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .modal-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--bg-element); }
        
        .tags-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        .tag-pill { background: var(--bg-body); border: 1px solid var(--border); padding: 6px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; text-align: center; user-select: none; transition: 0.2s; }
        .tag-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* --- UTILS --- */
        .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Toast */
        #toast { position: fixed; bottom: 30px; right: 30px; background: var(--bg-element); border-left: 4px solid var(--accent); padding: 15px 25px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 9999; }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <!-- SIDEBAR: INPUT & QUEUE -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Cycle <span>MediaDB</span></h1>
        </div>
        
        <div class="sidebar-content">
            <!-- Steam Section -->
            <div style="background: rgba(124, 58, 237, 0.05); padding: 15px; border-radius: var(--radius); border: 1px solid rgba(124, 58, 237, 0.2);">
                <label>Добавить из Steam</label>
                <textarea id="steamInput" placeholder="2825530, https://store... " style="height: 70px; margin-bottom: 10px;"></textarea>
                <button class="btn full" onclick="addSteamGames()">
                    <span class="icon">🎮</span> Загрузить данные
                </button>
            </div>

            <!-- Custom Button -->
            <button class="btn secondary full" onclick="openModal()">
                <span>🛠</span> Добавить Свою Игру (Custom)
            </button>

            <div style="border-top: 1px solid var(--border); margin: 10px 0;"></div>

            <!-- Queue -->
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="margin:0">Очередь (<span id="queueCount">0</span>)</label>
                <button class="btn small secondary" onclick="clearQueue()">Очистить</button>
            </div>
            <div id="queueList" class="queue-list">
                <!-- Items will be here -->
                <div style="text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px;">Список пуст</div>
            </div>
        </div>
    </div>

    <!-- MAIN: CONTENT & PREVIEW -->
    <div class="main">
        <div class="main-header">
            <h2>Генератор & Загрузчик</h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn secondary" onclick="downloadZip('cover')">💾 Обложки (.zip)</button>
                <button class="btn secondary" onclick="downloadZip('banner')">💾 Баннеры (.zip)</button>
                <button class="btn secondary" onclick="downloadZip('screenshots')">🖼 Скриншоты (.zip)</button>
            </div>
        </div>

        <div class="main-content">
            <!-- JSON Output -->
            <label>1. Результат для games.json</label>
            <div class="json-box">
                <button class="btn small secondary copy-icon" onclick="copyJson()">Копировать</button>
                <pre id="jsonOutput">// Добавьте игры, чтобы получить JSON...</pre>
            </div>

            <!-- Visual Preview -->
            <label style="margin-top: 30px;">2. Предпросмотр Ассетов</label>
            <div id="assetsGrid" class="assets-grid"></div>
        </div>
    </div>

    <!-- MODAL: ADD CUSTOM GAME -->
    <dialog id="customModal">
        <div class="modal-header">
            <h3>Добавление Custom Игры</h3>
            <button class="q-remove" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <div>
                <label>Название игры *</label>
                <input type="text" id="custTitle" placeholder="Например: Valorant" oninput="generateId()">
            </div>
            
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>ID (Авто)</label>
                    <input type="text" id="custId" readonly style="background: #111; color: var(--text-dim);">
                </div>
                <div style="width: 120px;">
                    <label>Tier</label>
                    <select id="custTier">
                        <option value="tier_aaa">AAA</option>
                        <option value="tier_indie">Indie</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Теги</label>
                <div class="tags-grid" id="tagsGrid">
                    <!-- Tags Generated via JS -->
                </div>
            </div>

            <div style="border-top: 1px solid var(--border); padding-top: 15px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <label>Ссылка на Обложку (600x900)</label>
                    <a href="#" style="font-size:11px; color:var(--accent)" onclick="searchGoogle('cover')">🔍 Найти в Google</a>
                </div>
                <input type="text" id="custCover" placeholder="https://...">
            </div>

            <div>
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <label>Ссылка на Баннер (1920x1080)</label>
                    <a href="#" style="font-size:11px; color:var(--accent)" onclick="searchGoogle('banner')">🔍 Найти в Google</a>
                </div>
                <input type="text" id="custBanner" placeholder="https://...">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn secondary" onclick="closeModal()">Отмена</button>
            <button class="btn" onclick="saveCustomGame()">Добавить в базу</button>
        </div>
    </dialog>

    <!-- TOAST NOTIFICATION -->
    <div id="toast">Уведомление</div>

    <script>
        // --- DATA & CONFIG ---
        const ALL_TAGS = [
            { id: 'tag_single', name: 'Singleplayer', keys: ['singleplayer', 'single-player'] },
            { id: 'tag_multi', name: 'Multiplayer', keys: ['multiplayer', 'co-op', 'coop', 'кооператив'] },
            { id: 'tag_action', name: 'Action', keys: ['action', 'экшен', 'shooter', 'шутер'] },
            { id: 'tag_adventure', name: 'Adventure', keys: ['adventure', 'приключение'] },
            { id: 'tag_rpg', name: 'RPG', keys: ['rpg', 'ролевая'] },
            { id: 'tag_strategy', name: 'Strategy', keys: ['strategy', 'стратегия'] },
            { id: 'tag_horror', name: 'Horror', keys: ['horror', 'survival horror'] },
            { id: 'tag_sport', name: 'Sport', keys: ['sport', 'racing', 'гонки'] },
            { id: 'tag_indie', name: 'Indie', keys: ['indie', 'инди'] }
        ];

        let queue = [];

        // --- UTILS ---
        const translit = { 'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ь':'','ы':'y','ъ':'','э':'e','ю':'yu','я':'ya' };
        
        function safeName(str) {
            return str.toLowerCase().split('').map(c => translit[c] || c).join('')
                .replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.borderColor = type === 'error' ? 'var(--red)' : 'var(--green)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // --- NETWORK (PROXY) ---
        async function fetchUrl(url, type = 'json') {
            const proxies = [
                { pre: 'https://corsproxy.io/?', enc: true },
                { pre: 'https://api.allorigins.win/raw?url=', enc: true },
                { pre: 'https://api.codetabs.com/v1/proxy?quest=', enc: false }
            ];
            
            for (let p of proxies) {
                try {
                    const target = p.enc ? encodeURIComponent(url) : url;
                    const res = await fetch(p.pre + target);
                    if (!res.ok) throw new Error(res.status);
                    return type === 'json' ? await res.json() : await res.blob();
                } catch(e) {}
            }
            throw new Error("Network Failed");
        }

        // --- LOGIC: STEAM ---
        async function addSteamGames() {
            const input = document.getElementById('steamInput').value;
            const ids = input.split(/[\s,]+/).map(s => {
                const m = s.match(/\/app\/(\d+)/);
                return m ? m[1] : ( /^\d+$/.test(s) ? s : null );
            }).filter(Boolean);

            if (!ids.length) return showToast('Нет ID для добавления', 'error');
            
            document.getElementById('steamInput').value = '';

            for (let id of ids) {
                if (queue.some(g => g.steam_id == id)) continue;
                
                const item = { steam_id: id, title: `Steam ID: ${id}`, status: 'loading', type: 'steam' };
                queue.unshift(item);
                renderQueue();

                // Process in background
                fetchSteamData(id).then(game => {
                    const idx = queue.indexOf(item);
                    if (idx > -1) queue[idx] = game;
                    renderAll();
                }).catch(e => {
                    const idx = queue.indexOf(item);
                    if (idx > -1) { item.status = 'error'; item.title += " (Ошибка)"; }
                    renderAll();
                });
                
                await new Promise(r => setTimeout(r, 300)); // Delay to be polite
            }
        }

        async function fetchSteamData(appId) {
            const data = await fetchUrl(`https://store.steampowered.com/api/appdetails?appids=${appId}&l=russian`, 'json');
            if (!data[appId].success) throw new Error("API Fail");
            
            const g = data[appId].data;
            const sName = safeName(g.name);
            const desc = [...(g.genres||[]), ...(g.categories||[])].map(x => x.description.toLowerCase());
            
            return {
                steam_id: appId,
                id: "game_" + sName,
                title: g.name,
                tier: desc.includes('инди') || desc.includes('indie') ? 'tier_indie' : 'tier_aaa',
                tags: ALL_TAGS.filter(t => t.keys.some(k => desc.includes(k))).map(t => t.id),
                description: (g.short_description || "").replace(/<[^>]*>?/gm, ''),
                assets: {
                    cover: { url: `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/library_600x900_2x.jpg`, file: `${sName}.jpg` },
                    banner: { url: g.header_image, file: `${sName}_banner.jpg` },
                    screenshots: (g.screenshots || []).slice(0, 4).map((s, i) => ({ 
                        url: s.path_full.split('?')[0], file: `${sName}_screen_${i+1}.jpg` 
                    }))
                },
                status: 'success',
                type: 'steam'
            };
        }

        // --- LOGIC: CUSTOM ---
        const modal = document.getElementById('customModal');
        const tagContainer = document.getElementById('tagsGrid');

        // Init Tags
        ALL_TAGS.forEach(t => {
            const el = document.createElement('div');
            el.className = 'tag-pill';
            el.innerText = t.name;
            el.dataset.id = t.id;
            el.onclick = () => el.classList.toggle('active');
            tagContainer.appendChild(el);
        });

        function openModal() {
            // Reset fields
            document.getElementById('custTitle').value = '';
            document.getElementById('custId').value = '';
            document.getElementById('custCover').value = '';
            document.getElementById('custBanner').value = '';
            document.querySelectorAll('.tag-pill').forEach(el => el.classList.remove('active'));
            modal.showModal();
        }

        function closeModal() { modal.close(); }

        function generateId() {
            const t = document.getElementById('custTitle').value;
            document.getElementById('custId').value = "game_" + safeName(t);
        }

        function searchGoogle(type) {
            const t = document.getElementById('custTitle').value;
            if(!t) return showToast('Сначала введите название', 'error');
            const q = type === 'cover' ? `${t} game box art vertical` : `${t} game wallpaper 1920x1080`;
            window.open(`https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q)}`, '_blank');
        }

        function saveCustomGame() {
            const title = document.getElementById('custTitle').value.trim();
            if (!title) return showToast('Название обязательно', 'error');
            
            const id = document.getElementById('custId').value;
            const sName = safeName(title);
            const tier = document.getElementById('custTier').value;
            const tags = Array.from(document.querySelectorAll('.tag-pill.active')).map(e => e.dataset.id);
            const cover = document.getElementById('custCover').value.trim();
            const banner = document.getElementById('custBanner').value.trim();

            const game = {
                steam_id: 'custom_' + Date.now(),
                id: id,
                title: title,
                tier: tier,
                tags: tags,
                description: "Custom entry",
                assets: {
                    cover: { url: cover || 'https://via.placeholder.com/600x900?text=No+Cover', file: `${sName}.jpg` },
                    banner: { url: banner || 'https://via.placeholder.com/1920x1080?text=No+Banner', file: `${sName}_banner.jpg` },
                    screenshots: []
                },
                status: 'success',
                type: 'custom'
            };

            queue.unshift(game);
            renderAll();
            closeModal();
            showToast('Игра добавлена вручную');
        }

        // --- RENDER & DOWNLOAD ---
        function clearQueue() { queue = []; renderAll(); }
        
        function removeGame(sid) {
            queue = queue.filter(g => g.steam_id != sid);
            renderAll();
        }

        function renderAll() { renderQueue(); renderJson(); renderGrid(); }

        function renderQueue() {
            const list = document.getElementById('queueList');
            document.getElementById('queueCount').innerText = queue.length;
            
            if (!queue.length) { list.innerHTML = '<div style="text-align:center; padding:20px; color:#666">Пусто</div>'; return; }

            list.innerHTML = queue.map(g => `
                <div class="queue-item ${g.status}">
                    ${g.assets ? `<img src="${g.assets.cover.url}" class="q-img" onerror="this.style.background='#333'">` : '<div class="q-img"></div>'}
                    <div class="q-details">
                        <div class="q-title">${g.title}</div>
                        <div class="q-status">${g.type === 'custom' ? '🛠 Custom' : '🎮 Steam'} • ${g.status}</div>
                    </div>
                    <button class="q-remove" onclick="removeGame('${g.steam_id}')">✕</button>
                </div>
            `).join('');
        }

        function renderJson() {
            const valid = queue.filter(g => g.status === 'success');
            const data = valid.map(g => ({
                id: g.id,
                title: g.title,
                tier: g.tier,
                tags: g.tags,
                description: g.description,
                assets: { cover: g.assets.cover.file, banner: g.assets.banner.file }
            }));
            document.getElementById('jsonOutput').textContent = JSON.stringify(data, null, 4);
        }

        function renderGrid() {
            const valid = queue.filter(g => g.status === 'success');
            const grid = document.getElementById('assetsGrid');
            grid.innerHTML = '';
            
            valid.forEach(g => {
                // Cover
                grid.innerHTML += `
                    <div class="asset-card">
                        <div class="asset-preview cover"><img src="${g.assets.cover.url}" loading="lazy"></div>
                        <div class="asset-name">${g.assets.cover.file}</div>
                        <button class="btn small secondary" onclick="dlOne('${g.assets.cover.url}', '${g.assets.cover.file}', this)">Скачать</button>
                    </div>`;
                // Banner
                grid.innerHTML += `
                    <div class="asset-card">
                        <div class="asset-preview"><img src="${g.assets.banner.url}" loading="lazy"></div>
                        <div class="asset-name">${g.assets.banner.file}</div>
                        <button class="btn small secondary" onclick="dlOne('${g.assets.banner.url}', '${g.assets.banner.file}', this)">Скачать</button>
                    </div>`;
            });
        }

        function copyJson() {
            navigator.clipboard.writeText(document.getElementById('jsonOutput').textContent);
            showToast('JSON скопирован');
        }

        async function dlOne(url, name, btn) {
            const txt = btn.innerText; btn.innerText = '...'; btn.disabled = true;
            try {
                const b = await fetchUrl(url, 'blob');
                saveAs(b, name);
                btn.innerText = '✓';
            } catch(e) { btn.innerText = 'Err'; showToast(e.message, 'error'); }
            finally { setTimeout(() => { btn.innerText = txt; btn.disabled = false; }, 2000); }
        }

        async function downloadZip(type) {
            const valid = queue.filter(g => g.status === 'success');
            if(!valid.length) return showToast('Нет игр', 'error');

            const zip = new JSZip();
            let folderName = type === 'cover' ? 'Covers' : (type === 'banner' ? 'Banners' : 'Screenshots');
            const folder = zip.folder(folderName);
            
            showToast(`Начато скачивание ${folderName}...`);

            for (const g of valid) {
                try {
                    if (type === 'cover') {
                        const b = await fetchUrl(g.assets.cover.url, 'blob');
                        folder.file(g.assets.cover.file, b);
                    } else if (type === 'banner') {
                        const b = await fetchUrl(g.assets.banner.url, 'blob');
                        folder.file(g.assets.banner.file, b);
                    } else if (type === 'screenshots') {
                        for (const s of g.assets.screenshots) {
                            const b = await fetchUrl(s.url, 'blob');
                            folder.file(s.file, b);
                        }
                    }
                } catch(e) { console.error(e); }
            }

            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, `${folderName}.zip`);
            showToast('Архив готов');
        }
    </script>
</body>
</html>
